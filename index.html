<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Movie Trailer Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e17; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 0; border-bottom: 2px solid #e94560; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 28px; font-weight: 800; }
        .logo span { color: #e94560; }
        .btn-add { background: #e94560; color: white; padding: 8px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .btn-add:hover { background: #c73652; }
        .hero { text-align: center; padding: 60px 0 40px; background: linear-gradient(135deg, #0a0e17, #1a1a2e); }
        .hero h1 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
        .hero h1 span { color: #e94560; }
        .hero p { color: #8899aa; font-size: 1.1rem; max-width: 600px; margin: 0 auto 30px; }
        .trailers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 40px 0; }
        .trailer-card { background: rgba(255,255,255,0.04); border-radius: 16px; overflow: hidden; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
        .trailer-card:hover { transform: translateY(-5px); border-color: #e94560; }
        .trailer-card .thumbnail { position: relative; height: 200px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 4rem; overflow: hidden; }
        .trailer-card .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .trailer-card .thumbnail .play-btn { position: absolute; width: 70px; height: 70px; background: rgba(233,69,96,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: all 0.3s; }
        .trailer-card:hover .play-btn { transform: scale(1.1); }
        .trailer-card .info { padding: 18px 20px; }
        .trailer-card .info h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .trailer-card .info .meta { display: flex; gap: 15px; font-size: 0.8rem; color: #8899aa; }
        .trailer-card .info .views { color: #e94560; font-weight: 600; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; border-radius: 16px; max-width: 650px; width: 100%; padding: 30px; border: 1px solid rgba(255,255,255,0.1); max-height: 90vh; overflow-y: auto; }
        .modal-close { float: right; background: none; border: none; color: #8899aa; font-size: 1.5rem; cursor: pointer; }
        .modal-close:hover { color: #fff; }
        .modal h2 { margin-bottom: 20px; color: #e94560; }
        .modal label { display: block; font-weight: 600; margin-bottom: 6px; color: #ccc; font-size: 0.9rem; }
        .modal input, .modal textarea { width: 100%; padding: 12px 16px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 0.95rem; outline: none; font-family: inherit; }
        .modal input:focus, .modal textarea:focus { border-color: #e94560; }
        .modal textarea { min-height: 100px; resize: vertical; }
        .modal .hint { font-size: 0.8rem; color: #667; margin-top: -10px; margin-bottom: 15px; }
        .modal .btn-submit { width: 100%; padding: 14px; background: #e94560; border: none; border-radius: 8px; color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .modal .btn-submit:hover { background: #c73652; }
        .modal .btn-ai { background: #00d4aa; color: #0a0e17; margin-bottom: 15px; }
        .modal .btn-ai:hover { background: #00b899; }
        .modal .loading { display: none; text-align: center; padding: 10px; color: #00d4aa; }
        .modal .loading.active { display: block; }
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h2 { font-size: 1.8rem; margin-bottom: 10px; }
        .empty-state p { color: #8899aa; }
        .footer { text-align: center; padding: 30px 0; color: #445; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
        .play-modal { max-width: 850px !important; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .play-info { padding: 15px 0; }
        .play-info h3 { color: #fff; }
        .play-info p { color: #8899aa; }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .trailers-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">🎬 <span>Trailer</span>Hub</div>
            <button class="btn-add" id="addBtn">+ Add New</button>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Discover <span>Movie Trailers</span></h1>
            <p>Watch and share the latest movie trailers. Paste any YouTube embed code to add!</p>
        </div>
    </section>

    <div class="container">
        <div id="trailersGrid" class="trailers-grid"></div>
    </div>

    <!-- ─── ADD MODAL ──────────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <button class="modal-close" id="closeAddBtn">✕</button>
            <h2>🎬 Add New Trailer</h2>
            
            <label>YouTube Embed Code *</label>
            <input type="text" id="inputEmbed" placeholder="https://www.youtube.com/embed/VIDEO_ID or full URL">
            <div class="hint">Paste YouTube URL or embed code (e.g., https://www.youtube.com/watch?v=abc123)</div>

            <label>Movie Title</label>
            <input type="text" id="inputTitle" placeholder="Auto-fetched from YouTube">
            
            <label>Description (AI Generated)</label>
            <textarea id="inputDesc" placeholder="Click 'Generate with AI' to auto-create description..."></textarea>
            
            <button class="btn-submit btn-ai" id="aiBtn">🤖 Generate with AI</button>
            <div class="loading" id="aiLoading">⏳ Generating description...</div>

            <button class="btn-submit" id="submitBtn">Add Trailer →</button>
        </div>
    </div>

    <!-- ─── PLAY MODAL ──────────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="playModal">
        <div class="modal play-modal">
            <button class="modal-close" id="closePlayBtn">✕</button>
            <div class="video-wrapper">
                <iframe id="playerFrame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="play-info">
                <h3 id="playTitle"></h3>
                <p id="playDesc"></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2025 TrailerHub — Built with ❤️</p>
        </div>
    </footer>

    <script>
        const API_URL = '/api/trailers';
        let trailers = [];

        // ─── LOAD TRAILERS ──────────────────────────────────────────────────
        async function loadTrailers() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                trailers = data.trailers || [];
                renderTrailers();
            } catch (e) {
                document.getElementById('trailersGrid').innerHTML = '<div class="empty-state"><div class="icon">🎬</div><h2>No Trailers Yet</h2><p>Click "Add New" to add your first movie trailer!</p></div>';
            }
        }

        // ─── RENDER TRAILERS ──────────────────────────────────────────────────
        function renderTrailers() {
            const grid = document.getElementById('trailersGrid');
            if (trailers.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">🎬</div><h2>No Trailers Yet</h2><p>Click "Add New" to add your first movie trailer!</p></div>';
                return;
            }
            let html = '';
            for (const t of trailers) {
                html += `<div class="trailer-card" onclick="playTrailer('${t.id}')">
                    <div class="thumbnail">${t.thumbnail ? `<img src="${t.thumbnail}" alt="${t.title}"/>` : '🎬'}
                    <div class="play-btn">▶</div></div>
                    <div class="info"><h3>${t.title}</h3>
                    <div class="meta">${t.year ? `<span>📅 ${t.year}</span>` : ''}${t.genre ? `<span>🎭 ${t.genre}</span>` : ''}
                    <span class="views">👁 ${t.views || 0}</span></div></div></div>`;
            }
            grid.innerHTML = html;
        }

        // ─── EXTRACT VIDEO ID ──────────────────────────────────────────────────
        function extractVideoId(input) {
            // YouTube embed URL: https://www.youtube.com/embed/VIDEO_ID
            let match = input.match(/youtube\.com\/embed\/([^?&]+)/);
            if (match) return match[1];
            
            // YouTube watch URL: https://www.youtube.com/watch?v=VIDEO_ID
            match = input.match(/youtube\.com\/watch\?v=([^&]+)/);
            if (match) return match[1];
            
            // YouTube short URL: https://youtu.be/VIDEO_ID
            match = input.match(/youtu\.be\/([^?&]+)/);
            if (match) return match[1];
            
            // If already only video ID
            if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
            
            return null;
        }

        // ─── FETCH YOUTUBE TITLE ──────────────────────────────────────────────
        async function fetchYoutubeTitle(videoId) {
            try {
                const res = await fetch(`/api/youtube?videoId=${videoId}`);
                const data = await res.json();
                return data.title || null;
            } catch (e) {
                return null;
            }
        }

        // ─── AI DESCRIPTION GENERATOR ──────────────────────────────────────────
        function generateAIDescription(title) {
            const templates = [
                `🎬 Watch the official trailer for "${title}" — an exciting new movie coming soon! Get ready for an unforgettable cinematic experience filled with action, drama, and emotion. Don't miss this highly anticipated release!`,
                `🔥 The trailer for "${title}" is here! Experience the thrill, the suspense, and the magic of this upcoming blockbuster. Starring an incredible cast, this is one movie you won't want to miss. Watch now!`,
                `🌟 "${title}" — the most anticipated movie of the year! This trailer gives you a sneak peek into an epic journey of adventure, love, and discovery. Prepare to be amazed by stunning visuals and a gripping story.`,
                `🎥 Get your first look at "${title}"! This trailer delivers a powerful glimpse into a world of excitement and wonder. From the creators of hit movies, comes a new cinematic masterpiece.`,
                `✨ The wait is over! The official trailer for "${title}" has arrived. Dive into a world of breathtaking moments, intense performances, and a story that will stay with you long after the credits roll.`
            ];
            return templates[Math.floor(Math.random() * templates.length)];
        }

        // ─── OPEN ADD MODAL ──────────────────────────────────────────────────
        document.getElementById('addBtn').addEventListener('click', () => {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('inputEmbed').value = '';
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputDesc').value = '';
        });

        document.getElementById('closeAddBtn').addEventListener('click', () => {
            document.getElementById('addModal').classList.remove('active');
        });

        // ─── DETECT VIDEO ID AND FETCH TITLE ──────────────────────────────────
        document.getElementById('inputEmbed').addEventListener('input', async function() {
            const embed = this.value.trim();
            const videoId = extractVideoId(embed);
            if (videoId) {
                const title = await fetchYoutubeTitle(videoId);
                if (title) {
                    document.getElementById('inputTitle').value = title;
                }
            }
        });

        // ─── AI GENERATE DESCRIPTION ──────────────────────────────────────────
        document.getElementById('aiBtn').addEventListener('click', async function() {
            const title = document.getElementById('inputTitle').value.trim() || 'this movie';
            const loading = document.getElementById('aiLoading');
            const descArea = document.getElementById('inputDesc');
            
            loading.classList.add('active');
            this.disabled = true;
            
            // Simulate AI generation (in production, call actual AI API)
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            const description = generateAIDescription(title);
            descArea.value = description;
            
            loading.classList.remove('active');
            this.disabled = false;
        });

        // ─── SUBMIT TRAILER ──────────────────────────────────────────────────
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const embed = document.getElementById('inputEmbed').value.trim();
            const title = document.getElementById('inputTitle').value.trim();
            const description = document.getElementById('inputDesc').value.trim();

            if (!embed) {
                alert('Please paste a YouTube embed URL or code');
                return;
            }

            const videoId = extractVideoId(embed);
            if (!videoId) {
                alert('Invalid YouTube URL. Please paste a valid YouTube link.');
                return;
            }

            const finalTitle = title || 'Untitled Movie';
            const finalDesc = description || generateAIDescription(finalTitle);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        videoId, 
                        youtubeUrl: embed,
                        title: finalTitle,
                        description: finalDesc
                    })
                });
                const result = await res.json();
                if (result.success) {
                    alert('✅ Trailer added successfully!');
                    document.getElementById('addModal').classList.remove('active');
                    document.getElementById('inputEmbed').value = '';
                    document.getElementById('inputTitle').value = '';
                    document.getElementById('inputDesc').value = '';
                    loadTrailers();
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (e) {
                alert('❌ Error: ' + e.message);
            }
        });

        // ─── PLAY TRAILER ──────────────────────────────────────────────────
        document.getElementById('closePlayBtn').addEventListener('click', () => {
            document.getElementById('playModal').classList.remove('active');
            document.getElementById('playerFrame').src = '';
        });

        function playTrailer(id) {
            const trailer = trailers.find(t => t.id === id);
            if (!trailer) return;
            
            let embedUrl = trailer.youtubeUrl;
            if (embedUrl.includes('watch?v=')) {
                const videoId = embedUrl.split('v=')[1]?.split('&')[0];
                embedUrl = 'https://www.youtube.com/embed/' + videoId;
            } else if (embedUrl.includes('youtu.be/')) {
                const videoId = embedUrl.split('youtu.be/')[1]?.split('?')[0];
                embedUrl = 'https://www.youtube.com/embed/' + videoId;
            }
            
            document.getElementById('playerFrame').src = embedUrl + '?autoplay=1';
            document.getElementById('playTitle').textContent = trailer.title;
            document.getElementById('playDesc').textContent = trailer.description || 'Watch the trailer for ' + trailer.title;
            document.getElementById('playModal').classList.add('active');
            
            fetch(API_URL + '/' + trailer.id + '/view', { method: 'POST' });
        }

        loadTrailers();
    </script>
</body>
</html>
